<svg width="900" height="180" viewBox="0 0 900 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub contribution activity</title>
  <desc id="desc">Fallback panel shown until GitHub Actions generates the contribution animation.</desc>
  <rect width="900" height="180" rx="18" fill="#0d1117"/>
  <rect x="1" y="1" width="898" height="178" rx="17" stroke="#30363d" stroke-width="2"/>
  <g transform="translate(46 42)">
    <text x="0" y="0" fill="#c9d1d9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">GitHub Activity</text>
    <text x="0" y="34" fill="#8b949e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">A Action do GitHub atualiza esta area com a animacao de contribuicoes.</text>
    <g transform="translate(0 68)">
      <rect x="0" y="0" width="16" height="16" rx="4" fill="#161b22" stroke="#30363d"/>
      <rect x="24" y="0" width="16" height="16" rx="4" fill="#0e4429"/>
      <rect x="48" y="0" width="16" height="16" rx="4" fill="#006d32"/>
      <rect x="72" y="0" width="16" height="16" rx="4" fill="#26a641"/>
      <rect x="96" y="0" width="16" height="16" rx="4" fill="#39d353"/>
      <text x="130" y="13" fill="#8b949e" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">aguardando primeira execucao do workflow</text>
    </g>
  </g>
</svg>
