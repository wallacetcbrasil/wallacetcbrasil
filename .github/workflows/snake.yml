name: Generate GitHub contribution snake

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: wallacetcbrasil
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-contribution-grid-snake.svg assets/github-contribution-grid-snake-dark.svg
          git diff --cached --quiet || git commit -m "chore: update contribution snake"
          git push
